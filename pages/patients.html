<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/patients.css" />
</head>

<body>

    <div class="layout-container">

        <!-- Left Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Hospital MS</h2>
                <p class="version">Version 1.0</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./patients.html" class="active">Patients</a></li>
                    <li><a href="./doctors.html">Doctors</a></li>
                    <li><a href="./appointments.html">Appointments</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>© 2026 Hospital Management System</p>
                <p>All rights reserved.</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <section id="content">
                <div class="page-header">
                    <h1>Patients Management</h1>
                    <button id="btn-add-patient" class="btn btn-primary">+ Add New Patient</button>
                </div>

                <!-- Patient Form (hidden by default - shown when adding or editing) -->
                <div class="card form-container" id="patient-form-container" style="display: none;">
                    <h2 id="form-title">Add New Patient</h2>

                    <form id="patient-form">
                        <input type="hidden" id="patient_id" name="patient_id">

                        <div class="form-group">
                            <label for="first_name">First Name *</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>

                        <div class="form-group">
                            <label for="last_name">Last Name *</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>

                        <div class="form-group">
                            <label for="date_of_birth">Date of Birth *</label>
                            <input type="date" id="date_of_birth" name="date_of_birth" required>
                        </div>

                        <div class="form-group">
                            <label>Gender *</label>
                            <div class="radio-group">
                                <label><input type="radio" name="gender" value="male" required> Male</label>
                                <label><input type="radio" name="gender" value="female" required> Female</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="phone_number">Phone Number</label>
                            <input type="tel" id="phone_number" name="phone_number" placeholder="+237 6XX XXX XXX">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="patient@example.com">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success" id="btn-save">Save Patient</button>
                            <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Patients Table -->
                <div class="card table-container">
                    <table id="patients-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Date of Birth</th>
                                <th>Gender</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="patients-table-body">
                            <!-- Data will be inserted here by JavaScript -->
                        </tbody>
                    </table>

                    <div id="no-patients" class="empty-state" style="display: none;">
                        <p>No patients found in the system.</p>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <script>
        let patients = [];           // Will hold the patient data
        let editingId = null;

        const form = document.getElementById('patient-form');
        const tableBody = document.getElementById('patients-table-body');
        const formContainer = document.getElementById('patient-form-container');
        const noPatientsMsg = document.getElementById('no-patients');

      
        function loadPatients() {

            // use fetch api
            fetch('http://localhost:8000/patients/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();  
            })
            .then(data => {
                patients = data;

                renderPatients();
            })
            .catch(error => {
                console.error('Fetch error:', error);
            });


        }

        function renderPatients() {
            tableBody.innerHTML = '';
            if (patients.length === 0) {
                noPatientsMsg.style.display = 'block';
                return;
            }
            noPatientsMsg.style.display = 'none';

            patients.forEach(patient => {
                const row = document.createElement('tr');
                row.innerHTML = `
                <td>${patient.patient_id}</td>
                <td>${patient.first_name}</td>
                <td>${patient.last_name}</td>
                <td>${patient.date_of_birth}</td>
                <td>${patient.gender === 'male' ? '♂' : '♀'} ${patient.gender}</td>
                <td>${patient.phone_number || '-'}</td>
                <td>${patient.email || '-'}</td>
                <td class="action-buttons">
                    <button class="btn btn-primary btn-sm" onclick="editPatient(${patient.patient_id})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deletePatient(${patient.patient_id})">Delete</button>
                </td>
            `;
                tableBody.appendChild(row);
            });
        }

        function showForm(isEdit = false) {
            if (!isEdit) {
                form.reset();
            }
            document.getElementById('form-title').textContent = isEdit ? 'Edit Patient' : 'Add New Patient';
            document.getElementById('btn-save').textContent = isEdit ? 'Update Patient' : 'Save Patient';
            formContainer.style.display = 'block';
            document.getElementById('btn-add-patient').style.display = 'none';
        }

        function hideForm() {
            formContainer.style.display = 'none';
            document.getElementById('btn-add-patient').style.display = 'inline-block';
            editingId = null;
        }

        // Show form when clicking "Add New Patient"
        document.getElementById('btn-add-patient').addEventListener('click', () => showForm(false));
        document.getElementById('btn-cancel').addEventListener('click', hideForm);

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const patientData = {
                patient_id: document.getElementById('patient_id').value || null,  // only used for update
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                date_of_birth: document.getElementById('date_of_birth').value,
                gender: document.querySelector('input[name="gender"]:checked')?.value || null,
                phone_number: document.getElementById('phone_number').value || null,
                email: document.getElementById('email').value || null
            };

            // Optional: basic client-side validation
            if (!patientData.first_name || !patientData.last_name) {
                alert("First name and last name are required!");
                return;
            }

            try {
                let response;
                let url = 'http://localhost:8000/patient';           // adjust if your API prefix is different (e.g. /api/patients)
                let method = 'POST';

                if (editingId) {
                    // UPDATE (PUT)
                    method = 'PUT';
                    url = `${url}/${editingId}`;
                }

                response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        // 'Authorization': 'Bearer your-token-here'   ← add if you have auth
                    },
                    body: JSON.stringify(patientData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();


                loadPatients();
                hideForm();
                form.reset();
                editingId = null;           // reset edit mode

            } catch (error) {
                console.error("Error saving patient:", error);
                alert("Failed to save patient: " + error.message);
            }
        });

        function editPatient(id) {
            const patient = patients.find(p => p.patient_id === id);
            if (!patient) return;

            editingId = id;
            
            document.getElementById('patient_id').value = patient.patient_id;
            document.getElementById('first_name').value = patient.first_name;
            document.getElementById('last_name').value = patient.last_name;
            document.getElementById('date_of_birth').value = patient.date_of_birth;
            document.querySelector(`input[name="gender"][value="${patient.gender}"]`).checked = true;
            document.getElementById('phone_number').value = patient.phone_number || '';
            document.getElementById('email').value = patient.email || '';

            showForm(true);
        }

        function deletePatient(id) {
            if (!confirm('Are you sure you want to delete this patient?')) return;

            // Here you would do fetch(`/api/patients/${id}`, {method: 'DELETE'})
            fetch(`http://localhost:8000/patients/${id}`, {
                method: 'DELETE',
            })
            .then(response => {
                if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
                return response.json();
            })
            .then(data => {
                console.log('Delete successful', data || 'No content returned');
                loadPatients();
            })
            .catch(error => {
                console.error('Error deleting resource:', error);
            });
        }

        // Load initial data
        loadPatients();
    </script>

</body>

</html>
