<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/appointments.css" />
</head>

<body>

   <div class="layout-container">

        <!-- Left Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Hospital MS</h2>
                <p class="version">Version 1.0</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./patients.html">Patients</a></li>
                    <li><a href="./doctors.html">Doctors</a></li>
                    <li><a href="./appointments.html" class="active">Appointments</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>© 2026 Hospital Management System</p>
                <p>All rights reserved.</p>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="main-content">
            <section id="content">
                <div class="page-header">
                    <h1> Appointment Management </h1>
                    <button id="btn-add-appointment" class="btn btn-primary">+ Add New Appointment</button>
                </div>

                <!-- Appointment Form (hidden by default - shown when booking or editing) -->
                <div class="card form-container" id="appointment-form-container" style="display: none;">
                    <h2 id="form-title">Add New Appointment</h2>

                     <form id="appointment-form">
                         <input type="hidden" id="appointment_id" name="appointment_id">

                         <!-- dropdown for patient -->
                         <div class="form-group">
                             <label for="patient_id">Patient *</label>
                             <select id="patient_id" name="patient_id" required>
                                 <!-- Options will be populated by JavaScript -->
                             </select>
                         </div>

                         <!-- dropdown for doctor -->
                         <div class="form-group">
                             <label for="doctor_id">Doctor *</label>
                             <select id="doctor_id" name="doctor_id" required>
                                 <!-- Options will be populated by JavaScript -->
                             </select>
                         </div>

                        <div class="form-group">
                             <label for="appointment_date">Appointment Date *</label>
                             <input type="datetime-local" id="appointment_date" name="appointment_date" required>
                         </div>

                         <div class="form-group">
                             <label for="reason_for_visit">Reason for Visit *</label>
                             <input type="text" id="reason_for_visit" name="reason_for_visit" required>
                         </div>

                         <div class="form-actions">
                             <button type="submit" class="btn btn-success" id="btn-save">Save Appointment</button>
                            <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                         </div>
                      </form>
                   </div>

                <!-- Appointments Table -->
                <div class="card table-container">
                    <table id="appointments-table">
                        <thead>
                            <tr>
                                <th>Appointment ID</th>
                                <th>Patient</th>
                                <th>Doctor</th>
                                <th>Appointment Date</th>
                                <th>Reason for Visit</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="appointments-table-body">
                            <!-- Data will be inserted here by JavaScript -->
                        </tbody>
                    </table>

                    <div id="no-appointments" class="empty-state" style="display: none;">
                        <p>No appointments found in the system.</p>
                    </div>
                </div>
            </section>
        </main>

    </div>


    <script>
        let appointments = [];           // Will hold the appointment data
        let editingId = null;

        const form = document.getElementById('appointment-form');
        const tableBody = document.getElementById('appointments-table-body');
        const formContainer = document.getElementById('appointment-form-container');
        const noAppointmentsMsg = document.getElementById('no-appointments');

        async function loadPatients() {
            // use fetch api
            fetch('http://localhost:8000/patients/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();  
            })
            .then(patients => {
                patients.forEach(patient => {
                    const option = document.createElement('option');
                    option.value = patient.patient_id;
                    option.textContent = `${patient.first_name} ${patient.last_name}`;
                    document.getElementById('patient_id').appendChild(option);
                });
            })
            .catch(error => {
                console.error('Fetch error:', error);
            });
        }

        async function loadDoctors() {

           // use fetch api
            fetch('http://localhost:8000/doctors/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();  
            })
            .then(doctors => {                
                doctors.forEach(doctor => {
                    const option = document.createElement('option');
                    option.value = doctor.doctor_id;
                    option.textContent = `Dr. ${doctor.first_name} ${doctor.last_name}`;
                    document.getElementById('doctor_id').appendChild(option);
                });
            })
            .catch(error => {
                console.error('Fetch error:', error);
            }); 

          }

         function loadAppointments() {

            // use fetch api
            fetch('http://localhost:8000/appointments/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();  
            })
            .then(data => {
                appointments = data;

                renderAppointments();
            })
            .catch(error => {
                console.error('Fetch error:', error);
            });


        }
         function renderAppointments() {
            tableBody.innerHTML = '';
            if (appointments.length === 0) {
                noAppointmentsMsg.style.display = 'block';
                return;
            }
            noAppointmentsMsg.style.display = 'none';

            appointments.forEach(appointment => {
                const row = document.createElement('tr');
                row.innerHTML = `
                <td>${appointment.appointment_id}</td>
                <td>${appointment.patient_name}</td>
                <td>${appointment.doctor_name}</td>
                <td>${appointment.appointment_date}</td>
                <td>${appointment.reason_for_visit}</td>
                <td class="action-buttons">
                    <button class="btn btn-primary btn-sm" onclick="editAppointment(${appointment.appointment_id})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteAppointment(${appointment.appointment_id})">Delete</button>
                </td>
            `;
                tableBody.appendChild(row);
            });
        }

        async function showForm(isEdit = false) {
            if (!isEdit) {
                form.reset();
            }

            
            // fetch patients and doctors to populate dropdowns
            loadPatients();
            loadDoctors();

            // SET MIN DATETIME TO TODAY
            const now = new Date();
            const formatted = now.toISOString().slice(0, 16);
            const appointmentDateInput = document.getElementById('appointment_date');
            appointmentDateInput.setAttribute('min', formatted);

            document.getElementById('form-title').textContent = isEdit ? 'Edit Appointment' : 'Add New Appointment';
            document.getElementById('btn-save').textContent = isEdit ? 'Update Appointment' : 'Save Appointment';
            document.getElementById('appointment-form-container').style.display = 'block';
            document.getElementById('btn-add-appointment').style.display = 'none';
        }

        function hideForm() {
            document.getElementById('appointment-form-container').style.display = 'none';
            document.getElementById('btn-add-appointment').style.display = 'inline-block';
            editingId = null;
        }

        // Show form when clicking "Add New Appointment"
        document.getElementById('btn-add-appointment').addEventListener('click', () => showForm(false));
        document.getElementById('btn-cancel').addEventListener('click', hideForm);

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const appointmentData = {
                appointment_id: document.getElementById('appointment_id').value,  // only used for update
                patient_id: document.getElementById('patient_id').value,
                doctor_id: document.getElementById('doctor_id').value,
                appointment_date: document.getElementById('appointment_date').value,
                reason: document.getElementById('reason_for_visit').value
            };

            // Optional: basic client-side validation
            if (!appointmentData.patient_id || !appointmentData.doctor_id) {
                alert("Patient ID and Doctor ID are required!");
                return;
            }

            try {
                let response;
                let url = 'http://localhost:8000/appointment';           // adjust if your API prefix is different (e.g. /api/appointments)
                let method = 'POST';

                if (editingId) {
                    // UPDATE (PUT)
                    method = 'PUT';
                    url = `${url}/${editingId}`;
                }

                response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        // 'Authorization': 'Bearer your-token-here'   ← add if you have auth
                    },
                    body: JSON.stringify(appointmentData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();


                loadAppointments();
                hideForm();
                form.reset();
                editingId = null;           // reset edit mode

            } catch (error) {
                console.error("Error saving appointment:", error);
                alert("Failed to save appointment: " + error.message);
            }
        });

        function editAppointment(id) {
            const appointment = appointments.find(a => a.appointment_id === id);
            console.log("Editing appointment:", appointment);
            if (!appointment) return;

            editingId = id;
            document.getElementById('appointment_id').value = appointment.appointment_id;
            document.getElementById('patient_id').value = appointment.patient_id;
            document.getElementById('doctor_id').value = appointment.doctor_id;
            document.getElementById('appointment_date').value = appointment.appointment_date.split('T')[0];  // format date for input
            document.getElementById('reason_for_visit').value = appointment.reason_for_visit;

            showForm(true);
        }

         function deleteAppointment(id) {
            if (!confirm('Are you sure you want to delete this appointment?')) return;

            // Here you would do fetch(`/api/appointments/${id}`, {method: 'DELETE'})
            fetch(`http://localhost:8000/appointments/${id}`, {
                method: 'DELETE',
            })
            .then(response => {
                if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
                return response.json();
            })
            .then(data => {
                console.log('Delete successful', data || 'No content returned');
                loadAppointments();
            })
            .catch(error => {
                console.error('Error deleting resource:', error);
            });
        }

         // Load initial data
        loadAppointments();
    </script>

</body>

</html>
