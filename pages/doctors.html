<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/doctors.css" />
</head>

<body>

    <div class="layout-container">

        <!-- Left Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Hospital MS</h2>
                <p class="version">Version 1.0</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./patients.html">Patients</a></li>
                    <li><a href="./doctors.html" class="active">Doctors</a></li>
                    <li><a href="./appointments.html">Appointments</a></li>
                </ul>
            </nav>

<div class="sidebar-footer">
                <p>© 2026 Hospital Management System</p>
                <p>All rights reserved.</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <section id="content">
                <div class="page-header">
                    <h1>Doctors Management</h1>
                    <button id="btn-add-doctor" class="btn btn-primary">+ Add New Doctor</button>
                </div>

     <!-- Doctor Form (hidden by default - shown when adding or editing) -->
                <div class="card form-container" id="doctor-form-container" style="display: none;">
                    <h2 id="form-title">Add New Doctor</h2>

                    <form id="doctor-form">
                        <input type="hidden" id="doctor_id" name="doctor_id">

                        <div class="form-group">
                            <label for="first_name">First Name *</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>

                        <div class="form-group">
                            <label for="last_name">Last Name *</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>

                        <div class="form-group">
                            <label for="specialization">Specialization *</label>
                            <input type="text" id="specialization" name="specialization" required>
                        </div>

                        <div class="form-group">
                            <label for="phone_number">Phone Number</label>
                            <input type="tel" id="phone_number" name="phone_number" placeholder="+237 6XX XXX XXX">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="doctor@example.com">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success" id="btn-save">Save Doctor</button>
                            <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                        </div>
                    </form>
                </div>  
                
                
              <!-- Doctor Table -->
                <div class="card table-container">
                    <table id="doctors-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Specialization</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="doctors-table-body">
                            <!-- Data will be inserted here by JavaScript -->
                        </tbody>
                    </table>

                     <div id="no-doctors" class="empty-state" style="display: none;">
                        <p>No doctors found in the system.</p>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <script>
        let doctors = [];           // Will hold the doctor data
        let editingId = null;

        const form = document.getElementById('doctor-form');
        const tableBody = document.getElementById('doctors-table-body');
        const formContainer = document.getElementById('doctor-form-container');
        const noDoctorsMsg = document.getElementById('no-doctors');

      
        function loadDoctors() {

           // use fetch api
            fetch('http://localhost:8000/doctors/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();  
            })
            .then(data => {
                doctors = data;

                renderDoctors();
            })
            .catch(error => {
                console.error('Fetch error:', error);
            }); 

          }


        function renderDoctors() {
            tableBody.innerHTML = '';
            if (doctors.length === 0) {
                noDoctorsMsg.style.display = 'block';
                return;
            }
            noDoctorsMsg.style.display = 'none';

            doctors.forEach(doctor => {
                const row = document.createElement('tr');
                row.innerHTML = `
                <td>${doctor.doctor_id}</td>
                <td>${doctor.first_name || '-'}</td>
                <td>${doctor.last_name || '-'}</td>
                <td>${doctor.specialization || '-'}</td>
                <td>${doctor.phone_number || '-'}</td>
                <td>${doctor.email || '-'}</td>
                <td class="action-buttons">
                    <button class="btn btn-primary btn-sm" onclick="editDoctor(${doctor.doctor_id})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${doctor.doctor_id})">Delete</button>
                </td>
            `;
                tableBody.appendChild(row);
            });
        }


        function editDoctor(id) {
            const doctor = doctors.find(doc => doc.doctor_id === id);
            if (!doctor) return;

            editingId = id;
            
            document.getElementById('first_name').value = doctor.first_name;
            document.getElementById('last_name').value = doctor.last_name;
            document.getElementById('specialization').value = doctor.specialization;
            document.getElementById('phone_number').value = doctor.phone_number;
            document.getElementById('email').value = doctor.email;
        
            showForm(true,);
        }

        function showForm(isEdit = false) {
            if (!isEdit) {
                form.reset();
            }
            document.getElementById('form-title').textContent = isEdit ? 'Edit Patient' : 'Add New Patient';
            document.getElementById('btn-save').textContent = isEdit ? 'Update Patient' : 'Save Patient';
            formContainer.style.display = 'block';
            document.getElementById('btn-add-doctor').style.display = 'none';
        }
 

        function hideForm() {
            formContainer.style.display = 'none';
            document.getElementById('btn-add-doctor').style.display = 'inline-block';
            editingId = null;
        }

        // Show form when clicking "Add New Doctors"
        document.getElementById('btn-add-doctor').addEventListener('click', () => showForm(false)   );
        document.getElementById('btn-cancel').addEventListener('click', hideForm);

       form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const doctorData = {
                doctor_id: document.getElementById('doctor_id').value || null,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                specialization: document.getElementById('specialization').value,
                phone_number: document.getElementById('phone_number').value || null,
                email: document.getElementById('email').value || null
            };

            // Optional: basic client-side validation
            if (!doctorData.first_name || !doctorData.last_name) {
                alert("First name and last name are required!");
                return;
            }
                

            // Optional: basic client-side validation
            if (!doctorData.first_name || !doctorData.last_name) {
                alert("First name and last name are required!");
                return;
            }

            try {
                let response;
                let url = 'http://localhost:8000/doctors';
                let method = 'POST';

                if (editingId) {
                    // UPDATE (PUT)
                    method = 'PUT';
                    url = `${url}/${editingId}`;
                }

                response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        // 'Authorization': 'Bearer your-token-he   re'   ← add if you have auth
                    },
                    body: JSON.stringify(doctorData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();


                loadDoctors();
                hideForm();
                form.reset();
                editingId = null;           // reset edit mode

            } catch (error) {
                console.error("Error saving doctor:", error);
                alert("Failed to save doctor: " + error.message);
            }
        });
            
        function deleteDoctor(id) {
            if (!confirm('Are you sure you want to delete this doctor?')) return;

      // Here you would do fetch(`/api/doctors/${id}`, {method: 'DELETE'})
            fetch(`http://localhost:8000/doctors/${id}`, {
                method: 'DELETE',
            })
            .then(response => {
                if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
           return response.json();
            })
            .then(data => {
                console.log('Delete successful', data || 'No content returned');
                loadDoctors();
            })
            .catch(error => {
                console.error('Error deleting resource:', error);
            });
        }
        // Load initial data
        loadDoctors();
    </script>

</body>

</html>
