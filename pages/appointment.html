<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>Book a Hospital Appointment</h1>
    <form action="http://127.0.0.1:8000/book_appointment" method="POST">
    <input type="text" name="patient_name" placeholder="Patient Name" required>
    <input type="text" name="doctor_name" placeholder="Doctor Name" required>
    <input type="date" name="appointment_date" required>
    <textarea name="reason" placeholder="Reason for appointment" required></textarea>
    <button type="submit">Book Appointment</button>
</form>
</body>
</html>
